      tags: [Tools]
      summary: QR code generator
      description: Generate a QR code image from text. This tool accepts a JSON body, not multipart.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 2000
                  description: Text to encode in the QR code
                size:
                  type: integer
                  minimum: 100
                  maximum: 10000
                  default: 400
                  description: Image size in pixels
                errorCorrection:
                  type: string
                  enum: [L, M, Q, H]
                  default: M
                foreground:
                  type: string
                  default: "#000000"
                  description: Foreground color (hex)
                background:
                  type: string
                  default: "#FFFFFF"
                  description: Background color (hex)
      responses:
        "200":
          description: Generated QR code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/strip-metadata/inspect:
    post:
      tags: [Tools]
      summary: Inspect metadata
      description: View all metadata (EXIF, GPS, ICC, XMP) in an image without removing it.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        "200":
          description: Image metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                  fileSize:
                    type: integer
                  exif:
                    type: object
                    description: EXIF metadata
                  exifError:
                    type: string
                    description: Present when EXIF parsing fails
                  gps:
                    type: object
                    description: GPS metadata
                  icc:
                    type: object
                    description: ICC profile metadata
                  xmp:
                    type: object
                    description: XMP metadata
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/edit-metadata:
    post:
      tags: [Tools]
      summary: Edit metadata
      description: Edit EXIF, IPTC, GPS, and other metadata fields in an image using ExifTool.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `title` (string) — Image title
                    - `author` (string) — Author name
                    - `artist` (string) — Artist or author name
                    - `copyright` (string) — Copyright notice
                    - `imageDescription` (string) — Image description
                    - `software` (string) — Software used
                    - `dateTime` (string) — Date/time string
                    - `dateTimeOriginal` (string) — Original capture date/time
                    - `clearGps` (boolean, default false) — Remove all GPS data
                    - `fieldsToRemove` (string[]) — Specific metadata fields to remove
                    - `gpsLatitude` (number -90 to 90) — GPS latitude
                    - `gpsLongitude` (number -180 to 180) — GPS longitude
                    - `gpsAltitude` (number) — GPS altitude in meters
                    - `keywords` (string[]) — Keywords or tags
                    - `keywordsMode` (string, default "add") — One of: add, set
                    - `dateShift` (string) — Shift dates by offset, e.g. "+2:00" or "-1:30"
                    - `setAllDates` (string) — Set all date fields to this value
                    - `iptcTitle` (string) — IPTC title
                    - `iptcHeadline` (string) — IPTC headline
                    - `iptcCity` (string) — IPTC city
                    - `iptcState` (string) — IPTC state or province
                    - `iptcCountry` (string) — IPTC country
      responses:
        "200":
          description: Image with updated metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/edit-metadata/inspect:
    post:
      tags: [Tools]
      summary: Inspect metadata (ExifTool)
      description: Read all metadata from an image using ExifTool. Returns all embedded EXIF, IPTC, XMP, and GPS fields.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        "200":
          description: Full metadata object (keys vary by image)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Batch ────────────────────────────────────────────────────────────────

  /api/v1/tools/{toolId}/batch:
    post:
      tags: [Batch]
      summary: Batch process images
      description: >
        Send multiple images through a single tool. Returns a ZIP file.
        The response includes an X-Job-Id header for progress tracking.
      security:
        - bearerAuth: []
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        "200":
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  # ─── Pipelines ────────────────────────────────────────────────────────────

  /api/v1/pipeline/execute:
    post:
      tags: [Pipelines]
      summary: Execute a pipeline
      description: Run an image through a chain of tools. The pipeline definition is sent as a JSON string in the `pipeline` multipart field.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, pipeline]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        "200":
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureNotInstalledError"

  /api/v1/pipeline/save:
    post:
      tags: [Pipelines]
      summary: Save a pipeline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, steps]
              properties:
                name:
                  type: string
                description:
                  type: string
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        "201":
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/pipeline/list:
    get:
      tags: [Pipelines]
      summary: List saved pipelines
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        steps:
                          type: array
                          items:
                            type: object
                        createdAt:
                          type: string
                          format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/pipeline/{id}:
    delete:
      tags: [Pipelines]
      summary: Delete a pipeline
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Pipeline UUID
          schema:
            type: string
      responses:
        "200":
          description: Pipeline deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "403":
          description: Not authorized to delete this pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Pipeline not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/pipeline/tools:
    get:
      tags: [Pipelines]
      summary: List pipeline-compatible tools
      description: Returns all tool IDs that can be used as pipeline steps.
      security: []
      responses:
        "200":
          description: Tool IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  toolIds:
                    type: array
                    items:
                      type: string

  /api/v1/pipeline/batch:
    post:
      tags: [Pipelines]
      summary: Run pipeline on multiple files
      description: Execute a pipeline across multiple images. Returns a ZIP file with all processed results.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, pipeline]
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process
                pipeline:
                  type: string
                  description: |
                    JSON string with pipeline definition:
                    - `steps` (array, required, 1-20 items) — Pipeline steps
                    - `steps[].toolId` (string, required) — Tool ID for this step
                    - `steps[].settings` (object, optional) — Tool-specific settings
                clientJobId:
                  type: string
                  description: Optional client-provided job ID for progress tracking via SSE
      responses:
        "200":
          description: ZIP file with processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job ID for progress tracking
            X-File-Results:
              schema:
                type: string
              description: JSON mapping of input index to output filename
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  # ─── Files ────────────────────────────────────────────────────────────────

  /api/v1/upload:
    post:
      tags: [Files]
      summary: Upload an image
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        format:
                          type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/download/{jobId}/{filename}:
    get:
      tags: [Files]
      summary: Download a processed image
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier from a tool processing response
          schema:
            type: string
        - name: filename
          in: path
          required: true
          description: Output filename from the processing response
          schema:
            type: string
      responses:
        "200":
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: File not found

  /api/v1/preview:
    post:
      tags: [Files]
      summary: Generate image preview
      description: Convert any image (including HEIC/HEIF) to a WebP preview, resized to fit within 1200x1200 pixels.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to preview
      responses:
        "200":
          description: WebP preview image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files:
    get:
      tags: [Files]
      summary: List saved files
      description: Returns the latest version of each file (one per version chain). Supports pagination and search.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        "200":
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
    delete:
      tags: [Files]
      summary: Bulk delete saved files
      description: Delete files and their entire version chains. Non-admin users can only delete their own files.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Total number of records deleted across all version chains
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/files/upload:
    post:
      tags: [Files]
      summary: Save file to library
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Files uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      description: Full file object with all metadata
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/files/save-result:
    post:
      tags: [Files]
      summary: Save a processing result to library
      description: Save a tool processing result as a new version of an existing file. Creates a version chain.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, parentId]
              properties:
                file:
                  type: string
                  format: binary
                  description: The processed image file
                parentId:
                  type: string
                  description: ID of the parent file in the version chain
                toolId:
                  type: string
                  description: Tool that produced this result
      responses:
        "201":
          description: File saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    description: Full file object with all metadata
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: Parent file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files/{id}:
    get:
      tags: [Files]
      summary: Get file metadata and version history
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        "200":
          description: File metadata with version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      id:
                        type: string
                      originalName:
                        type: string
                      mimeType:
                        type: string
                      size:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                      version:
                        type: integer
                      parentId:
                        type: string
                        nullable: true
                      toolChain:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                  versions:
                    type: array
                    items:
                      type: object
                    description: Full version chain of this file
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files/{id}/download:
    get:
      tags: [Files]
      summary: Download a saved file
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        "200":
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/files/{id}/thumbnail:
    get:
      tags: [Files]
      summary: Get file thumbnail
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        "200":
          description: 300px JPEG thumbnail
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Thumbnail generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Auth ─────────────────────────────────────────────────────────────────

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      role:
                        type: string
                      mustChangePassword:
                        type: boolean
                      permissions:
                        type: array
                        items:
                          type: string
                      teamName:
                        type: string
                      analyticsEnabled:
                        type: boolean
                        nullable: true
                      analyticsConsentShownAt:
                        type: integer
                        nullable: true
                      analyticsConsentRemindAt:
                        type: integer
                        nullable: true
                  expiresAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      security:
        - bearerAuth: []
