              schema:
                type: object
                properties:
                  authEnabled:
                    type: boolean

  /api/v1/jobs/{jobId}/progress:
    get:
      tags: [System]
      summary: Job progress (SSE)
      description: >
        Server-Sent Events stream for tracking long-running jobs. Closes
        automatically 5 seconds after completion.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of job progress events
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  completedFiles:
                    type: array
                    items:
                      type: string
                  failedFiles:
                    type: array
                    items:
                      type: string
