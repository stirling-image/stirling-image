      summary: Image to Base64
      description: |
        Convert one or more images to Base64-encoded strings with data URIs.
        Supports optional format conversion and resizing. Returns both the raw
        Base64 string and a ready-to-use data URI for each file.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more image files to convert
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `outputFormat` (string, default "original") - One of: original, jpeg, png, webp, avif
                    - `quality` (integer 1-100, default 80) - Output quality for lossy formats
                    - `maxWidth` (integer, default 0) - Max width in pixels (0 = no limit)
                    - `maxHeight` (integer, default 0) - Max height in pixels (0 = no limit)
      responses:
        "200":
          description: Base64-encoded results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        mimeType:
                          type: string
                        width:
                          type: integer
                        height:
                          type: integer
                        originalSize:
                          type: integer
                          description: Original file size in bytes
                        encodedSize:
                          type: integer
                          description: Base64 string size in bytes
                        overheadPercent:
                          type: number
                          description: Size overhead of Base64 encoding
                        base64:
                          type: string
                          description: Raw Base64-encoded image data
                        dataUri:
                          type: string
                          description: Complete data URI (data:mime;base64,...)
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
