  /api/v1/admin/features/{bundleId}/install:
    post:
      tags: [Features]
      summary: Install a feature bundle
      description: |
        Start async installation of an AI feature bundle. Downloads models and
        configures the Python sidecar. Returns a jobId for progress tracking
        via the SSE endpoint. Requires features:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        "202":
          description: Installation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bundle already installed or another install in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      tags: [Features]
      summary: Uninstall a feature bundle
      description: |
        Uninstall an AI feature bundle and delete its model files (unless shared
        with another installed bundle). Requires features:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        "200":
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/v1/admin/features/disk-usage:
    get:
      tags: [Features]
      summary: AI model disk usage
      description: |
        Returns the total disk space used by AI model files.
        Requires features:manage permission.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Disk usage
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBytes:
                    type: integer
                    description: Total bytes used by AI model files
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  # ─── Audit Log ───────────────────────────────────────────────────────────

  /api/v1/audit-log:
    get:
      tags: [Audit]
      summary: Query audit log
      description: |
        Paginated audit log of administrative actions. Supports filtering by
        action type and date range. Requires audit:read permission.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Results per page (1-100, default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
        - name: from
          in: query
          description: Filter entries after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter entries before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        actorId:
                          type: string
                        actorUsername:
                          type: string
                        action:
                          type: string
                        targetType:
                          type: string
                        targetId:
                          type: string
                        details:
                          type: object
                          nullable: true
                        ipAddress:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total matching entries
                  page:
                    type: integer
                  limit:
                    type: integer
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"

  # ─── Roles ───────────────────────────────────────────────────────────────

  /api/v1/roles:
    get:
      tags: [Roles]
      summary: List roles
      description: |
        List all roles (built-in and custom) with their permissions and user
        counts. Requires audit:read permission.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        permissions:
                          type: array
                          items:
                            type: string
                        isBuiltin:
                          type: boolean
                        userCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
    post:
      tags: [Roles]
      summary: Create a custom role
      description: |
        Create a new custom role with specified permissions. Role names must be
        2-30 characters, lowercase alphanumeric with hyphens and underscores.
        Requires users:manage permission.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  pattern: "^[a-z0-9_-]+$"
                  description: Lowercase role name
                description:
                  type: string
                  description: Human-readable description
                permissions:
                  type: array
                  items:
                    type: string
                  description: |
                    Permission strings. Valid values: tools:use, files:own, files:all,
                    apikeys:own, apikeys:all, pipelines:own, pipelines:all,
                    settings:read, settings:write, users:manage, teams:manage,
                    branding:manage, features:manage, system:health, audit:read
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  permissions:
                    type: array
                    items:
                      type: string
                  isBuiltin:
                    type: boolean
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "409":
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /api/v1/roles/{id}:
    put:
      tags: [Roles]
      summary: Update a custom role
      description: |
        Update name, description, or permissions of a custom role. Built-in
        roles cannot be modified. Requires users:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                description:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Validation error or cannot modify built-in role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"
    delete:
      tags: [Roles]
      summary: Delete a custom role
      description: |
        Delete a custom role. Users assigned to this role are reassigned to the
        default "user" role. Built-in roles cannot be deleted. Requires
        users:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      responses:
        "200":
          description: Role deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Cannot delete built-in role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenError"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
