      description: |
        Returns all available AI feature bundles and their installation status.
        In non-Docker environments, all bundles show as installed.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        status:
                          type: string
                          enum: [installed, not_installed, installing, error]
                        installedVersion:
                          type: string
                          nullable: true
                        estimatedSize:
                          type: string
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
