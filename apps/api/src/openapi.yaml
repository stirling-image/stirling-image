openapi: 3.1.0
info:
  title: SnapOtter API
  version: 1.15.9
  description: |
    REST API for SnapOtter, a self-hosted image processing platform with 48 tools.

    ## Authentication

    Most endpoints require authentication via one of two methods:

    1. **Session cookie** — Call `POST /api/auth/login` with username and password. The response includes a `token` field. Pass it as `Authorization: Bearer <token>` on subsequent requests.

    2. **API key** — Generate a key via the Settings UI or `POST /api/v1/api-keys`. Keys are prefixed with `si_`. Pass as `Authorization: Bearer si_...`.

    Endpoints marked with a lock icon require authentication. Admin-only endpoints are noted in their description.
  license:
    name: AGPL-3.0
    url: https://github.com/snapotter-hq/snapotter/blob/main/LICENSE

servers:
  - url: /
    description: Current instance

tags:
  - name: Tools
    description: Image processing tools. Each accepts a multipart file upload and returns a download URL.
  - name: Batch
    description: Process multiple images through a tool in one request.
  - name: Pipelines
    description: Chain multiple tools into reusable workflows.
  - name: Files
    description: Upload, download, and manage processed images.
  - name: Auth
    description: Login, logout, session management, and user administration.
  - name: API Keys
    description: Create and manage API keys for programmatic access.
  - name: Settings
    description: System-wide configuration (admin only for writes).
  - name: Teams
    description: Organize users into teams.
  - name: Branding
    description: Custom logo management.
  - name: Roles
    description: Custom role management with fine-grained permissions.
  - name: Audit
    description: Audit log for tracking administrative actions.
  - name: Analytics
    description: Analytics configuration and user consent.
  - name: Features
    description: AI feature bundle installation and management.
  - name: Admin
    description: Administrative health diagnostics.
  - name: System
    description: Health checks, configuration, and job progress.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token from login or API key (prefixed with si_)

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Invalid image format
        details:
          type: string
          description: Additional error details (e.g. Zod validation errors)

    ToolResponse:
      type: object
      properties:
        jobId:
          type: string
          description: Unique job identifier
        downloadUrl:
          type: string
          description: URL to download the processed image
          example: /api/v1/download/abc123/output.png
        originalSize:
          type: integer
          description: Original file size in bytes
        processedSize:
          type: integer
          description: Processed file size in bytes
        previewUrl:
          type: string
          description: URL to a WebP preview (present when output is not browser-previewable, e.g. TIFF, HEIF)
        savedFileId:
          type: string
          description: ID of the auto-saved file in the library (present when fileId was provided in the request)

    UnauthorizedError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 401
        error:
          type: string
          example: Unauthorized
        message:
          type: string
          example: Authentication required

    ForbiddenError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 403
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: Insufficient permissions

    ConflictError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 409
        error:
          type: string
          example: Conflict
        message:
          type: string
          example: Resource already exists

    FeatureNotInstalledError:
      type: object
      properties:
        error:
          type: string
          example: Feature not installed
        code:
          type: string
          example: FEATURE_NOT_INSTALLED
        feature:
          type: string
          description: Feature bundle identifier
        featureName:
          type: string
          description: Human-readable feature name
        estimatedSize:
          type: string
          description: Estimated download size

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        version:
          type: string
        uptime:
          type: string
        database:
          type: string
          enum: [ok, error]

    AdminHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        version:
          type: string
        uptime:
          type: string
        storage:
          type: object
          properties:
            mode:
              type: string
            available:
              type: string
        database:
          type: string
          enum: [ok, error]
        queue:
          type: object
          properties:
            active:
              type: integer
            pending:
              type: integer
        ai:
          type: object
          properties:
            gpu:
              type: boolean

security:
  - bearerAuth: []

paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: Health check
      description: Returns server health status. Used by Docker HEALTHCHECK. Public endpoint.
      security: []
      responses:
        "200":
          description: Server health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/tools/resize:
    post:
      tags: [Tools]
      summary: Resize
      description: Resize an image to specific dimensions or by percentage.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (number, optional) — Target width in pixels
                    - `height` (number, optional) — Target height in pixels
                    - `fit` (string, default "contain") — One of: contain, cover, fill, inside, outside
                    - `withoutEnlargement` (boolean, default false) — Prevent upscaling
                    - `percentage` (number, optional) — Scale by percentage instead of fixed dimensions
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/content-aware-resize:
    post:
      tags: [Tools]
      summary: Content-aware resize
      description: Resize an image using seam carving to intelligently remove or insert content while preserving important features.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (number, optional) — Target width in pixels
                    - `height` (number, optional) — Target height in pixels
                    - `protectFaces` (boolean, default false) — Detect and protect faces from distortion
                    - `blurRadius` (number 0-20, default 4) — Blur radius for energy map
                    - `sobelThreshold` (number 1-20, default 2) — Edge detection threshold
                    - `square` (boolean, default false) — Crop to square aspect ratio

                    At least one of `width`, `height`, or `square` must be provided.
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ToolResponse"
                  - type: object
                    properties:
                      width:
                        type: integer
                      height:
                        type: integer
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/crop:
    post:
      tags: [Tools]
      summary: Crop
      description: Crop an image to a specific region.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `left` (number, required) — Left offset in pixels (min 0)
                    - `top` (number, required) — Top offset in pixels (min 0)
                    - `width` (number, required) — Width of crop region in pixels
                    - `height` (number, required) — Height of crop region in pixels
                    - `unit` (string, optional) — One of: px, percent
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/rotate:
    post:
      tags: [Tools]
      summary: Rotate and flip
      description: Rotate an image by angle or flip horizontally/vertically.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `angle` (number, default 0) — Rotation angle in degrees
                    - `horizontal` (boolean, default false) — Flip horizontally
                    - `vertical` (boolean, default false) — Flip vertically
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/convert:
    post:
      tags: [Tools]
      summary: Convert format
      description: Convert an image to a different format.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `format` (string, required) — One of: jpg, png, webp, avif, tiff, gif, heic, heif
                    - `quality` (number 1-100, optional) — Output quality
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/compress:
    post:
      tags: [Tools]
      summary: Compress
      description: Reduce image file size by quality level or target size.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") — One of: quality, targetSize
                    - `quality` (number 1-100, optional) — Compression quality level
                    - `targetSizeKb` (number, optional) — Target file size in kilobytes
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/strip-metadata:
    post:
      tags: [Tools]
      summary: Strip metadata
      description: Remove EXIF, GPS, ICC, or XMP metadata from an image.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `stripExif` (boolean, default false) — Remove EXIF data
                    - `stripGps` (boolean, default false) — Remove GPS data
                    - `stripIcc` (boolean, default false) — Remove ICC profile
                    - `stripXmp` (boolean, default false) — Remove XMP data
                    - `stripAll` (boolean, default true) — Remove all metadata
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/border:
    post:
      tags: [Tools]
      summary: Border and frame
      description: Add a border, rounded corners, padding, or shadow to an image.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `borderWidth` (number 0-2000, default 10) — Border thickness in pixels
                    - `borderColor` (hex string, default "#000000") — Border color
                    - `padding` (number 0-200, default 0) — Inner padding in pixels
                    - `paddingColor` (hex string, default "#FFFFFF") — Padding fill color
                    - `cornerRadius` (number 0-2000, default 0) — Corner rounding radius
                    - `shadow` (boolean, default false) — Enable drop shadow
                    - `shadowBlur` (number 1-200, default 15) — Drop shadow blur radius
                    - `shadowOffsetX` (number -50 to 50, default 0) — Shadow horizontal offset
                    - `shadowOffsetY` (number -50 to 50, default 5) — Shadow vertical offset
                    - `shadowColor` (hex string, default "#000000") — Drop shadow color
                    - `shadowOpacity` (number 0-100, default 40) — Shadow opacity percentage
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/adjust-colors:
    post:
      tags: [Tools]
      summary: Color adjustments
      description: |
        Consolidated color adjustment tool. Adjusts brightness, contrast, exposure,
        saturation, temperature, tint, hue, sharpness, color channels, and effects
        in a single pass. This is the primary color adjustment endpoint; the
        brightness-contrast, saturation, color-channels, and color-effects endpoints
        are aliases that accept the same settings schema.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `brightness` (number -100 to 100, default 0) - Brightness adjustment
                    - `contrast` (number -100 to 100, default 0) - Contrast adjustment
                    - `exposure` (number -100 to 100, default 0) - Exposure adjustment (gamma)
                    - `saturation` (number -100 to 100, default 0) - Color saturation
                    - `temperature` (number -100 to 100, default 0) - Color temperature (cool to warm)
                    - `tint` (number -100 to 100, default 0) - Tint shift (green to magenta)
                    - `hue` (number -180 to 180, default 0) - Hue rotation in degrees
                    - `sharpness` (number 0 to 100, default 0) - Sharpness enhancement
                    - `red` (number 0-200, default 100) - Red channel multiplier
                    - `green` (number 0-200, default 100) - Green channel multiplier
                    - `blue` (number 0-200, default 100) - Blue channel multiplier
                    - `effect` (string, default "none") - One of: none, grayscale, sepia, invert
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/brightness-contrast:
    post:
      tags: [Tools]
      summary: Brightness and contrast
      description: Adjust brightness, contrast, saturation, color channels, and effects. Alias for adjust-colors.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `brightness` (number -100 to 100, default 0) — Brightness adjustment
                    - `contrast` (number -100 to 100, default 0) — Contrast adjustment
                    - `saturation` (number -100 to 100, default 0) — Saturation adjustment
                    - `exposure` (number -100 to 100, default 0) — Exposure adjustment
                    - `temperature` (number -100 to 100, default 0) — Color temperature
                    - `tint` (number -100 to 100, default 0) — Tint adjustment
                    - `hue` (number -180 to 180, default 0) — Hue rotation
                    - `sharpness` (number 0 to 100, default 0) — Sharpness
                    - `red` (number 0-200, default 100) — Red channel multiplier
                    - `green` (number 0-200, default 100) — Green channel multiplier
                    - `blue` (number 0-200, default 100) — Blue channel multiplier
                    - `effect` (string, default "none") — One of: none, grayscale, sepia, invert
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/saturation:
    post:
      tags: [Tools]
      summary: Saturation and exposure
      description: Adjust color saturation and exposure settings.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `brightness` (number -100 to 100, default 0) — Brightness adjustment
                    - `contrast` (number -100 to 100, default 0) — Contrast adjustment
                    - `saturation` (number -100 to 100, default 0) — Saturation adjustment
                    - `exposure` (number -100 to 100, default 0) — Exposure adjustment
                    - `temperature` (number -100 to 100, default 0) — Color temperature
                    - `tint` (number -100 to 100, default 0) — Tint adjustment
                    - `hue` (number -180 to 180, default 0) — Hue rotation
                    - `sharpness` (number 0 to 100, default 0) — Sharpness
                    - `red` (number 0-200, default 100) — Red channel multiplier
                    - `green` (number 0-200, default 100) — Green channel multiplier
                    - `blue` (number 0-200, default 100) — Blue channel multiplier
                    - `effect` (string, default "none") — One of: none, grayscale, sepia, invert
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/color-channels:
    post:
      tags: [Tools]
      summary: Color channels
      description: Adjust individual RGB color channels.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `brightness` (number -100 to 100, default 0) — Brightness adjustment
                    - `contrast` (number -100 to 100, default 0) — Contrast adjustment
                    - `saturation` (number -100 to 100, default 0) — Saturation adjustment
                    - `exposure` (number -100 to 100, default 0) — Exposure adjustment
                    - `temperature` (number -100 to 100, default 0) — Color temperature
                    - `tint` (number -100 to 100, default 0) — Tint adjustment
                    - `hue` (number -180 to 180, default 0) — Hue rotation
                    - `sharpness` (number 0 to 100, default 0) — Sharpness
                    - `red` (number 0-200, default 100) — Red channel multiplier
                    - `green` (number 0-200, default 100) — Green channel multiplier
                    - `blue` (number 0-200, default 100) — Blue channel multiplier
                    - `effect` (string, default "none") — One of: none, grayscale, sepia, invert
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/color-effects:
    post:
      tags: [Tools]
      summary: Color effects
      description: Apply color effects like grayscale, sepia, or invert.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `brightness` (number -100 to 100, default 0) — Brightness adjustment
                    - `contrast` (number -100 to 100, default 0) — Contrast adjustment
                    - `saturation` (number -100 to 100, default 0) — Saturation adjustment
                    - `exposure` (number -100 to 100, default 0) — Exposure adjustment
                    - `temperature` (number -100 to 100, default 0) — Color temperature
                    - `tint` (number -100 to 100, default 0) — Tint adjustment
                    - `hue` (number -180 to 180, default 0) — Hue rotation
                    - `sharpness` (number 0 to 100, default 0) — Sharpness
                    - `red` (number 0-200, default 100) — Red channel multiplier
                    - `green` (number 0-200, default 100) — Green channel multiplier
                    - `blue` (number 0-200, default 100) — Blue channel multiplier
                    - `effect` (string, default "none") — One of: none, grayscale, sepia, invert
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

  /api/v1/tools/sharpening:
    post:
      tags: [Tools]
      summary: Sharpening
      description: Sharpen an image using adaptive, unsharp mask, or high-pass methods with optional noise reduction.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `method` (string, default "adaptive") - One of: adaptive, unsharp-mask, high-pass
                    - `sigma` (number 0.5-10, default 1.0) - Gaussian sigma (adaptive)
                    - `m1` (number 0-10, default 1.0) - Flat area sharpening (adaptive)
                    - `m2` (number 0-20, default 3.0) - Jagged area sharpening (adaptive)
                    - `x1` (number 0-10, default 2.0) - Flat/jagged threshold (adaptive)
                    - `y2` (number 0-50, default 12) - Maximum brightening (adaptive)
                    - `y3` (number 0-50, default 20) - Maximum darkening (adaptive)
                    - `amount` (number 0-1000, default 100) - Sharpen amount (unsharp-mask)
                    - `radius` (number 0.1-5, default 1.0) - Blur radius (unsharp-mask)
                    - `threshold` (number 0-255, default 0) - Luminance threshold (unsharp-mask)
                    - `strength` (number 0-100, default 50) - Blend strength (high-pass)
                    - `kernelSize` (integer, default 3) - One of: 3, 5 (high-pass)
                    - `denoise` (string, default "off") - One of: off, light, medium, strong
      responses:
        "200":
          description: Processed image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"

